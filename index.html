<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Player One Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #0f1838 0%, #060914 55%, #02030a 100%);
      color: #ffffff;
      font-family: "Courier New", monospace;
      overflow-x: hidden;
      position: relative;
    }

    /* Fake Galaga gameplay background */
    .arcade-background {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 15%, rgba(91, 167, 255, 0.12), transparent 18%),
        radial-gradient(circle at 80% 25%, rgba(255, 77, 166, 0.12), transparent 18%),
        linear-gradient(180deg, #0b1230 0%, #050814 60%, #02030a 100%);
    }

    .game-scene {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.9;
    }

    .starfield,
    .starfield-two,
    .starfield-three {
      position: absolute;
      inset: 0;
      background-repeat: repeat;
    }

    .starfield {
      background-image: radial-gradient(circle, rgba(255,255,255,0.9) 0 1px, transparent 1.5px);
      background-size: 90px 90px;
      animation: starDrift 18s linear infinite;
      opacity: 0.7;
    }

    .starfield-two {
      background-image: radial-gradient(circle, rgba(120,220,255,0.9) 0 1px, transparent 1.5px);
      background-size: 140px 140px;
      animation: starDrift 30s linear infinite reverse;
      opacity: 0.45;
    }

    .starfield-three {
      background-image: radial-gradient(circle, rgba(255,210,90,0.85) 0 1px, transparent 1.5px);
      background-size: 200px 200px;
      animation: starDrift 42s linear infinite;
      opacity: 0.3;
    }

    .galaga-hud {
      position: absolute;
      top: 18px;
      left: 22px;
      color: #ffe44d;
      font-size: 14px;
      line-height: 1.4;
      text-shadow: 0 0 10px rgba(255, 228, 77, 0.75);
      background: rgba(7, 10, 24, 0.45);
      border: 1px solid rgba(255, 228, 77, 0.25);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .enemy-fleet {
      position: absolute;
      top: 90px;
      left: 50%;
      width: 420px;
      height: 180px;
      transform: translateX(-50%);
      animation: fleetMove 7s ease-in-out infinite;
    }

    .enemy {
      position: absolute;
      width: 34px;
      height: 28px;
      background: linear-gradient(180deg, #ff5bcb, #8c38ff);
      clip-path: polygon(50% 0%, 80% 15%, 100% 45%, 82% 100%, 60% 78%, 40% 78%, 18% 100%, 0% 45%, 20% 15%);
      box-shadow: 0 0 14px rgba(255, 91, 203, 0.6);
      animation: enemyPulse 1.1s ease-in-out infinite alternate;
    }

    .enemy::before,
    .enemy::after {
      content: "";
      position: absolute;
      width: 6px;
      height: 10px;
      background: #7cfbff;
      border-radius: 6px;
      top: 6px;
    }

    .enemy::before { left: 8px; }
    .enemy::after { right: 8px; }

    .e1 { left: 20px; top: 0; }
    .e2 { left: 80px; top: 0; }
    .e3 { left: 140px; top: 0; }
    .e4 { left: 200px; top: 0; }
    .e5 { left: 260px; top: 0; }
    .e6 { left: 320px; top: 0; }
    .e7 { left: 50px; top: 52px; }
    .e8 { left: 110px; top: 52px; }
    .e9 { left: 170px; top: 52px; }
    .e10 { left: 230px; top: 52px; }
    .e11 { left: 290px; top: 52px; }
    .e12 { left: 80px; top: 104px; }
    .e13 { left: 140px; top: 104px; }
    .e14 { left: 200px; top: 104px; }
    .e15 { left: 260px; top: 104px; }

    .diver {
      position: absolute;
      width: 34px;
      height: 28px;
      background: linear-gradient(180deg, #57f0ff, #2d6bff);
      clip-path: polygon(50% 0%, 80% 15%, 100% 45%, 82% 100%, 60% 78%, 40% 78%, 18% 100%, 0% 45%, 20% 15%);
      box-shadow: 0 0 14px rgba(87, 240, 255, 0.65);
    }

    .diver.one {
      top: 110px;
      left: 25%;
      animation: diveLeft 5.5s ease-in-out infinite;
    }

    .diver.two {
      top: 130px;
      right: 25%;
      animation: diveRight 6.2s ease-in-out infinite;
      animation-delay: 1.6s;
    }

    .player-ship {
      position: absolute;
      bottom: 55px;
      left: 50%;
      width: 44px;
      height: 36px;
      transform: translateX(-50%);
      animation: shipFloat 2s ease-in-out infinite;
    }

    .player-ship .wing-left,
    .player-ship .wing-right,
    .player-ship .core,
    .player-ship .cockpit {
      position: absolute;
    }

    .player-ship .wing-left {
      left: 0;
      bottom: 4px;
      width: 18px;
      height: 16px;
      background: #49d7ff;
      clip-path: polygon(100% 0%, 100% 100%, 0% 55%);
      box-shadow: 0 0 12px rgba(73, 215, 255, 0.65);
    }

    .player-ship .wing-right {
      right: 0;
      bottom: 4px;
      width: 18px;
      height: 16px;
      background: #49d7ff;
      clip-path: polygon(0% 0%, 100% 55%, 0% 100%);
      box-shadow: 0 0 12px rgba(73, 215, 255, 0.65);
    }

    .player-ship .core {
      left: 14px;
      bottom: 0;
      width: 16px;
      height: 28px;
      background: linear-gradient(180deg, #ffe44d, #ff7b2c);
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
      box-shadow: 0 0 14px rgba(255, 228, 77, 0.8);
    }

    .player-ship .cockpit {
      left: 17px;
      bottom: 16px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 0 8px rgba(255,255,255,0.8);
    }

    .player-shot {
      position: absolute;
      bottom: 88px;
      left: 50%;
      width: 4px;
      height: 70px;
      transform: translateX(-50%);
      background: linear-gradient(180deg, rgba(124,251,255,0), #7cfbff, rgba(124,251,255,0));
      box-shadow: 0 0 10px rgba(124, 251, 255, 0.95);
      border-radius: 999px;
      animation: playerShot 0.8s linear infinite;
    }

    .player-shot.two {
      animation-delay: 0.4s;
    }

    .enemy-shot {
      position: absolute;
      width: 4px;
      height: 54px;
      background: linear-gradient(180deg, rgba(255,120,80,0), #ff8555, rgba(255,120,80,0));
      box-shadow: 0 0 10px rgba(255, 133, 85, 0.85);
      border-radius: 999px;
    }

    .enemy-shot.one {
      top: 220px;
      left: 42%;
      animation: enemyShot 1.8s linear infinite;
    }

    .enemy-shot.two {
      top: 200px;
      right: 37%;
      animation: enemyShot 2s linear infinite;
      animation-delay: 0.8s;
    }

    .explosion {
      position: absolute;
      top: 255px;
      left: 56%;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff6a3 0%, #ff9f3f 35%, #ff4d6d 65%, transparent 100%);
      box-shadow: 0 0 18px rgba(255, 159, 63, 0.85);
      animation: explodePulse 1.2s ease-in-out infinite;
    }

    .screen {
      width: 92%;
      max-width: 1120px;
      margin: 40px auto;
      border: 1px solid rgba(54, 249, 246, 0.35);
      box-shadow:
        0 0 45px rgba(54, 249, 246, 0.16),
        0 20px 80px rgba(0, 0, 0, 0.55),
        inset 0 0 35px rgba(255, 255, 255, 0.03);
      border-radius: 28px;
      padding: 34px;
      background: rgba(7, 9, 24, 0.58);
      backdrop-filter: blur(13px);
      position: relative;
      overflow: hidden;
    }
